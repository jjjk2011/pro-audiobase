<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scanner de Fase | AudioBase Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-base: #09090b;
            --bg-gradient: radial-gradient(circle at top, #13131a 0%, #09090b 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --accent: #b042ff;
            --accent-glow: rgba(176, 66, 255, 0.25);
            --success: #39ff14;
            --danger: #ff4d4d;
            --warning: #ffcc00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg-base);
            background-image: var(--bg-gradient);
            color: var(--text-main);
            font-family: 'Outfit', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 60px;
            overflow-x: hidden;
        }

        .bg-glow {
            position: absolute; top: -100px; left: 50%;
            transform: translateX(-50%);
            width: 500px; height: 350px;
            background: radial-gradient(circle, var(--accent-glow) 0%, rgba(0,0,0,0) 70%);
            z-index: -1; filter: blur(60px);
            transition: background 0.8s ease;
        }
        .bg-glow.glow-ok   { background: radial-gradient(circle, rgba(57,255,20,0.2) 0%, rgba(0,0,0,0) 70%); }
        .bg-glow.glow-inv  { background: radial-gradient(circle, rgba(255,77,77,0.2) 0%, rgba(0,0,0,0) 70%); }

        .top-bar {
            width: 100%; max-width: 550px;
            padding: 20px;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 1;
        }

        .btn-back {
            color: var(--text-muted); text-decoration: none;
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            width: 45px; height: 45px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s; font-size: 1.1rem;
        }
        .btn-back:hover { background: var(--glass-hover); color: var(--text-main); border-color: rgba(255,255,255,0.2); }
        .btn-back:active { transform: scale(0.92); }

        .container { width: 90%; max-width: 950px; z-index: 1; }

        .content-grid { display: flex; flex-direction: column; gap: 15px; }
        @media (min-width: 768px) {
            .content-grid {
                display: grid;
                grid-template-columns: 1.2fr 1fr;
                gap: 25px;
                align-items: start;
            }
        }

        .header-page { text-align: center; margin: 10px 0 22px; }
        .header-page i {
            color: var(--accent); font-size: 1.8rem; margin-bottom: 12px;
            display: inline-block; background: rgba(0,0,0,0.3);
            padding: 15px; border-radius: 18px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .header-page h1 { margin: 0; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }

        /* ── Result Box ── */
        .result-box {
            background: var(--glass-bg); backdrop-filter: blur(16px);
            border-radius: 20px; padding: 25px;
            text-align: center; margin-bottom: 0;
            border: 1px solid var(--glass-border);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative; overflow: hidden;
        }
        .result-box::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
            transition: background 0.4s;
        }
        .result-box.normal  { border-color: var(--success); box-shadow: 0 0 35px rgba(57,255,20,0.15); }
        .result-box.normal::before  { background: linear-gradient(90deg, transparent, var(--success), transparent); }
        .result-box.invertido { border-color: var(--danger); box-shadow: 0 0 35px rgba(255,77,77,0.15); }
        .result-box.invertido::before { background: linear-gradient(90deg, transparent, var(--danger), transparent); }

        .result-icon {
            font-size: 2.8rem; margin-bottom: 10px;
            display: inline-flex; align-items: center; justify-content: center;
            width: 80px; height: 80px;
        }
        @keyframes radar-pulse {
            0%   { box-shadow: 0 0 0 0 rgba(176,66,255,0.45); }
            70%  { box-shadow: 0 0 0 22px rgba(176,66,255,0); }
            100% { box-shadow: 0 0 0 0 rgba(176,66,255,0); }
        }
        .result-icon.listening {
            animation: radar-pulse 1.5s infinite;
            border-radius: 50%;
            background: rgba(176,66,255,0.1);
        }

        .result-text { font-size: 1.3rem; font-weight: 800; letter-spacing: 1px; color: var(--text-muted); text-transform: uppercase; }
        .result-detail { font-size: 0.8rem; color: var(--text-muted); margin-top: 8px; font-weight: 400; line-height: 1.4; }

        /* ── Freq Badge ── */
        .freq-badge {
            display: inline-flex; align-items: center; gap: 8px;
            margin-top: 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 6px 16px;
            font-size: 0.85rem; color: var(--text-muted);
            font-weight: 600; letter-spacing: 0.5px;
            transition: color 0.3s, border-color 0.3s;
        }
        .freq-badge i { color: var(--accent); font-size: 0.75rem; }
        .freq-badge span { color: var(--text-main); }

        /* ── Canvas ── */
        .canvas-wrapper {
            margin-top: 18px;
            border-radius: 14px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
            overflow: hidden;
            box-shadow: inset 0 0 12px rgba(0,0,0,0.6);
            position: relative;
        }
        canvas { width: 100%; height: 75px; display: block; }

        /* ── Controls ── */
        .control-group {
            background: var(--glass-bg); backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 20px;
            display: flex; flex-direction: column; gap: 12px;
        }

        button {
            width: 100%; border: none; padding: 15px;
            border-radius: 14px; font-weight: 700; font-size: 0.9rem;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            font-family: 'Outfit', sans-serif;
        }

        .btn-test {
            background: var(--accent); color: #000;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .btn-test:hover { filter: brightness(1.12); transform: translateY(-2px); }
        .btn-test:active { transform: scale(0.96); }
        .btn-test.active {
            background: var(--danger); color: #fff;
            box-shadow: 0 0 20px rgba(255,77,77,0.4);
        }

        .btn-pulse {
            background: transparent;
            border: 2px solid #00d2ff;
            color: #00d2ff;
        }
        .btn-pulse:hover { background: rgba(0,210,255,0.1); }
        .btn-pulse:active { transform: scale(0.96); }
        .btn-pulse.firing {
            background: #00d2ff; color: #000;
            box-shadow: 0 0 20px rgba(0,210,255,0.4);
        }

        .invert-btn {
            background: transparent;
            border: 2px solid var(--warning);
            color: var(--warning);
        }
        .invert-btn:hover { background: rgba(255,204,0,0.1); }
        .invert-btn.active { background: var(--warning); color: #000; box-shadow: 0 0 20px rgba(255,204,0,0.3); }

        /* ── Sensitivity Slider ── */
        .slider-section {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 14px 16px;
        }
        .slider-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px;
        }
        .slider-label {
            font-size: 0.78rem; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
        }
        .slider-value {
            font-size: 0.9rem; font-weight: 700; color: var(--accent);
            background: rgba(176,66,255,0.1);
            border: 1px solid rgba(176,66,255,0.2);
            border-radius: 8px; padding: 2px 10px;
            min-width: 55px; text-align: center;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%; height: 5px;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            outline: none; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px; height: 20px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
            cursor: pointer;
            transition: transform 0.15s;
        }
        input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.3); }

        .status {
            font-size: 0.78rem; color: var(--text-muted);
            text-align: center;
            font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            min-height: 1.2em;
        }
    </style>
</head>
<body>
    <div class="bg-glow" id="bgGlow"></div>

    <div class="top-bar">
        <a href="index.html" class="btn-back"><i class="fas fa-chevron-left"></i></a>
        <div style="width: 45px;"></div>
    </div>

    <div class="container">
        <div class="header-page">
            <i class="fas fa-wave-square"></i>
            <h1>Scanner de Fase</h1>
        </div>

        <div class="content-grid">
            <!-- Resultado + Canvas -->
            <div class="result-box" id="resultBox">
                <div class="result-icon" id="resultIcon"><i class="fas fa-microphone-alt"></i></div>
                <div class="result-text" id="resultText">PARADO</div>
                <div class="result-detail" id="resultDetail">Ative a escuta para começar o teste contínuo.</div>

                <div class="freq-badge" id="freqBadge">
                    <i class="fas fa-music"></i>
                    Freq: <span id="freqValue">-- Hz</span>
                </div>

                <div class="canvas-wrapper">
                    <canvas id="oscCanvas" width="512" height="75"></canvas>
                </div>
            </div>

            <!-- Controles -->
            <div class="control-group">
                <button id="testBtn" class="btn-test"><i class="fas fa-play"></i> Ativar Escuta</button>

                <button id="pulseBtn" class="btn-pulse"><i class="fas fa-bolt"></i> Disparar Pulso de Teste</button>

                <button id="invertBtn" class="invert-btn"><i class="fas fa-exchange-alt"></i> Inverter Leitura do Mic</button>

                <!-- Slider de Sensibilidade -->
                <div class="slider-section">
                    <div class="slider-header">
                        <span class="slider-label"><i class="fas fa-sliders-h"></i> Sensibilidade</span>
                        <span class="slider-value" id="thresholdDisplay">0.25</span>
                    </div>
                    <input type="range" id="thresholdSlider" min="3" max="70" value="25" step="1">
                </div>

                <div class="status" id="statusMsg">Pronto para testar</div>
            </div>
        </div>
    </div>

    <script>
        // ─── State ───────────────────────────────────────────────────────────
        let audioContext, analyser, microphone;
        let isTesting    = false;
        let invertReading = false;
        let animationId;
        let cooldown     = false;
        let threshold    = 0.25;
        let currentState = ''; // '', 'normal', 'invertido'

        // ─── DOM refs ─────────────────────────────────────────────────────────
        const testBtn    = document.getElementById('testBtn');
        const pulseBtn   = document.getElementById('pulseBtn');
        const invertBtn  = document.getElementById('invertBtn');
        const statusMsg  = document.getElementById('statusMsg');
        const resultBox  = document.getElementById('resultBox');
        const resultIcon = document.getElementById('resultIcon');
        const resultText = document.getElementById('resultText');
        const resultDetail = document.getElementById('resultDetail');
        const freqValue  = document.getElementById('freqValue');
        const bgGlow     = document.getElementById('bgGlow');
        const canvas     = document.getElementById('oscCanvas');
        const canvasCtx  = canvas.getContext('2d');
        const thresholdSlider  = document.getElementById('thresholdSlider');
        const thresholdDisplay = document.getElementById('thresholdDisplay');

        // ─── Threshold Slider ─────────────────────────────────────────────────
        thresholdSlider.addEventListener('input', () => {
            threshold = thresholdSlider.value / 100;
            thresholdDisplay.textContent = threshold.toFixed(2);
        });

        // ─── Audio Init ───────────────────────────────────────────────────────
        async function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
                    });
                    microphone = audioContext.createMediaStreamSource(stream);
                    microphone.connect(analyser);
                } catch (err) {
                    alert('Erro ao acessar microfone: ' + err.message);
                    return false;
                }
            }
            if (audioContext.state === 'suspended') await audioContext.resume();
            return true;
        }

        // ─── Pulse de Teste ───────────────────────────────────────────────────
        pulseBtn.addEventListener('click', async () => {
            // Garantir contexto de áudio
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') await audioContext.resume();

            pulseBtn.classList.add('firing');
            pulseBtn.innerHTML = '<i class="fas fa-bolt"></i> Disparando...';

            // Gera um clique positivo (pulso de referência de fase)
            const bufferSize = audioContext.sampleRate * 0.05; // 50ms
            const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
            const data = buffer.getChannelData(0);

            for (let i = 0; i < bufferSize; i++) {
                // Forma de onda: atacke rápido, decaimento exponencial → simula um clique
                const t = i / audioContext.sampleRate;
                data[i] = Math.exp(-80 * t) * Math.sin(2 * Math.PI * 80 * t);
            }

            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(audioContext.destination);
            source.start();

            setTimeout(() => {
                pulseBtn.classList.remove('firing');
                pulseBtn.innerHTML = '<i class="fas fa-bolt"></i> Disparar Pulso de Teste';
            }, 500);
        });

        // ─── Toggle ───────────────────────────────────────────────────────────
        testBtn.addEventListener('click', () => isTesting ? stopTest() : startTest());

        async function startTest() {
            const ok = await initAudio();
            if (!ok) return;
            isTesting = true;
            testBtn.classList.add('active');
            testBtn.innerHTML = '<i class="fas fa-stop"></i> Parar Escuta';
            resultIcon.classList.add('listening');
            updateUI('', '<i class="fas fa-satellite-dish"></i>', 'ESCUTANDO...', 'Aguardando pulso no microfone...');
            statusMsg.innerText = 'Modo Contínuo Ativado';
            analyzeAudio();
        }

        function stopTest() {
            isTesting = false;
            cancelAnimationFrame(animationId);
            testBtn.classList.remove('active');
            testBtn.innerHTML = '<i class="fas fa-play"></i> Ativar Escuta';
            resultIcon.classList.remove('listening');
            updateUI('', '<i class="fas fa-microphone-alt"></i>', 'PARADO', 'Ative a escuta para começar.');
            statusMsg.innerText = 'Pronto para testar';
            currentState = '';
            bgGlow.className = 'bg-glow';
            freqValue.textContent = '-- Hz';
            canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // ─── Canvas (waveform visual melhorado) ───────────────────────────────
        function drawCanvas(dataArray, bufferLength, state) {
            const w = canvas.width;
            const h = canvas.height;

            // Fundo com fade
            canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.35)';
            canvasCtx.fillRect(0, 0, w, h);

            // Grid central (linha de 0)
            canvasCtx.beginPath();
            canvasCtx.setLineDash([4, 8]);
            canvasCtx.lineWidth = 1;
            canvasCtx.strokeStyle = 'rgba(255,255,255,0.07)';
            canvasCtx.moveTo(0, h / 2);
            canvasCtx.lineTo(w, h / 2);
            canvasCtx.stroke();
            canvasCtx.setLineDash([]);

            // Cor dinâmica baseada no estado
            let waveColor;
            if (state === 'normal')    waveColor = '#39ff14';
            else if (state === 'invertido') waveColor = '#ff4d4d';
            else                        waveColor = '#b042ff';

            // Gradiente vertical
            const grad = canvasCtx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0,   waveColor + 'dd');
            grad.addColorStop(0.5, waveColor + 'ff');
            grad.addColorStop(1,   waveColor + 'dd');

            canvasCtx.lineWidth = 2;
            canvasCtx.strokeStyle = grad;
            canvasCtx.shadowBlur = 8;
            canvasCtx.shadowColor = waveColor;

            canvasCtx.beginPath();
            const sliceWidth = w / bufferLength;
            let x = 0;
            for (let i = 0; i < bufferLength; i++) {
                let v = dataArray[i];
                if (invertReading) v = -v;
                const y = (v * 0.8 + 0.5) * h;
                i === 0 ? canvasCtx.moveTo(x, y) : canvasCtx.lineTo(x, y);
                x += sliceWidth;
            }
            canvasCtx.lineTo(w, h / 2);
            canvasCtx.stroke();
            canvasCtx.shadowBlur = 0;
        }

        // ─── Frequência Dominante (via FFT) ───────────────────────────────────
        function getDominantFreq(sampleRate) {
            const fftSize   = analyser.fftSize;
            const freqBins  = analyser.frequencyBinCount;
            const freqData  = new Uint8Array(freqBins);
            analyser.getByteFrequencyData(freqData);

            // Ignora os primeiros bins (DC / ruído muito baixo)
            let maxAmp = 0;
            let maxBin = 0;
            for (let i = 2; i < freqBins; i++) {
                if (freqData[i] > maxAmp) { maxAmp = freqData[i]; maxBin = i; }
            }

            if (maxAmp < 10) return null; // Silêncio
            const freq = maxBin * sampleRate / fftSize;
            return Math.round(freq);
        }

        // ─── Loop Principal ───────────────────────────────────────────────────
        function analyzeAudio() {
            if (!isTesting) return;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray    = new Float32Array(bufferLength);
            analyser.getFloatTimeDomainData(dataArray);

            drawCanvas(dataArray, bufferLength, currentState);

            // Frequência dominante (atualiza a cada frame se estiver tocando)
            const freq = getDominantFreq(audioContext.sampleRate);
            freqValue.textContent = freq ? freq + ' Hz' : '-- Hz';

            // Lógica de disparo
            if (!cooldown) {
                let localMax = 0, localMin = 0;
                for (let i = 0; i < bufferLength; i++) {
                    let val = dataArray[i];
                    if (invertReading) val = -val;
                    if (val > localMax) localMax = val;
                    if (val < localMin) localMin = val;
                }

                if (Math.abs(localMax) > threshold || Math.abs(localMin) > threshold) {
                    const isPositive = Math.abs(localMax) > Math.abs(localMin);

                    if (isPositive) {
                        currentState = 'normal';
                        updateUI('normal', '✅', 'NORMAL (+)', 'Cone impulsiona para fora.');
                        bgGlow.className = 'bg-glow glow-ok';
                    } else {
                        currentState = 'invertido';
                        updateUI('invertido', '⚠️', 'INVERTIDA (−)', 'Fase invertida! Verifique os cabos.');
                        bgGlow.className = 'bg-glow glow-inv';
                    }

                    cooldown = true;
                    setTimeout(() => {
                        cooldown = false;
                        if (isTesting) {
                            currentState = '';
                            bgGlow.className = 'bg-glow';
                            updateUI('', '<i class="fas fa-satellite-dish"></i>', 'ESCUTANDO...', 'Aguardando próximo pulso...');
                        }
                    }, 700);
                }
            }

            animationId = requestAnimationFrame(analyzeAudio);
        }

        // ─── UI Helper ────────────────────────────────────────────────────────
        function updateUI(cls, icon, txt, det) {
            resultBox.className = 'result-box ' + cls;
            resultIcon.innerHTML = icon;
            resultText.innerText = txt;

            if      (cls === 'normal')    resultText.style.color = 'var(--success)';
            else if (cls === 'invertido') resultText.style.color = 'var(--danger)';
            else                          resultText.style.color = 'var(--text-muted)';

            resultDetail.innerText = det;
        }

        // ─── Inverter Mic ─────────────────────────────────────────────────────
        invertBtn.addEventListener('click', () => {
            invertReading = !invertReading;
            invertBtn.classList.toggle('active');
            invertBtn.innerHTML = invertReading
                ? '<i class="fas fa-check"></i> Microfone Invertido'
                : '<i class="fas fa-exchange-alt"></i> Inverter Leitura do Mic';
        });
    </script>
</body>
</html>
