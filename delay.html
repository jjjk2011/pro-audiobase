<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Delay / TA - AudioBase Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0e14; 
            --card: #161b22; 
            --inner-bg: #0d1117; 
            --border: #30363d;
            --text: #ffffff; 
            --dim: #8b949e; 
            --accent: #ff9800; /* Laranja para o Delay */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding-bottom: 50px; 
        }

        .top-bar { 
            width: 100%; 
            max-width: 500px; 
            padding: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }

        .btn-back { 
            color: var(--text); 
            text-decoration: none; 
            background: var(--card); 
            border: 1px solid var(--border); 
            width: 45px; 
            height: 45px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 0.2s; 
        }
        .btn-back:active { transform: scale(0.95); }

        .container { width: 90%; max-width: 500px; }
        
        .header-page { text-align: center; margin: 10px 0 25px; }
        .header-page i { color: var(--accent); font-size: 2rem; margin-bottom: 10px; display: inline-block; background: var(--inner-bg); padding: 15px; border-radius: 20px; box-shadow: 0 0 0 1px var(--border); }
        .header-page h1 { margin: 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }

        .res-display { 
            background: var(--inner-bg); 
            border: 2px solid var(--border); 
            border-radius: 30px; 
            padding: 40px 10px; 
            margin-bottom: 25px; 
            text-align: center; 
            transition: 0.3s ease;
        }
        
        .res-main { font-size: 3.5rem; font-weight: bold; margin: 0; font-family: monospace; color: var(--accent); }
        .res-unit { color: var(--dim); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; font-weight: bold; }

        .control-group { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        
        .section-label { 
            color: var(--accent); 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 15px; 
            display: flex; 
            align-items: center; 
            border-left: 3px solid var(--accent); 
            padding-left: 10px; 
            font-weight: bold; 
        }
        
        label { display: block; color: var(--dim); font-size: 0.65rem; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
        
        input[type="number"] { 
            width: 100%; 
            background: var(--inner-bg); 
            border: 1px solid var(--border); 
            color: white; 
            padding: 15px; 
            border-radius: 12px; 
            font-size: 1.2rem; 
            text-align: center; 
            outline: none; 
            box-sizing: border-box; 
        }
        
        input[type="range"] { width: 100%; accent-color: var(--accent); margin-top: 10px; background: transparent; }

        .fine-tune { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-top: 15px; }
        
        .btn-tune { 
            background: var(--inner-bg); 
            border: 1px solid var(--border); 
            color: white; 
            padding: 12px 5px; 
            border-radius: 10px; 
            font-size: 0.75rem; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        .btn-tune:active { transform: scale(0.95); border-color: var(--dim); }
        
        .btn-auto { 
            width: 100%; 
            padding: 22px; 
            border-radius: 20px; 
            border: 2px solid var(--accent); 
            background: transparent; 
            color: var(--accent); 
            font-size: 1rem; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            transition: 0.2s;
        }
        .btn-auto:active { transform: scale(0.98); }
        .btn-auto.active { background: var(--accent); color: #000; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="index.html" class="btn-back"><i class="fas fa-chevron-left"></i></a>
        <div style="width: 45px;"></div> </div>

    <div class="container">
        <div class="header-page">
            <i class="fas fa-stopwatch"></i>
            <h1>Delay / TA</h1>
        </div>

        <div id="display-card" class="res-display">
            <div class="res-main" id="res-ms">0.00</div>
            <div class="res-unit">ms (Milissegundos)</div>
        </div>

        <div class="control-group">
            <span class="section-label">Ajuste Manual</span>
            <label>Metros (m)</label>
            <input type="number" id="dist" value="1.00" step="0.01" oninput="calcularManual()">
            <div class="fine-tune">
                <button class="btn-tune" onclick="ajustar(-0.1)">-10cm</button>
                <button class="btn-tune" onclick="ajustar(-0.01)">-1cm</button>
                <button class="btn-tune" onclick="ajustar(0.01)">+1cm</button>
                <button class="btn-tune" onclick="ajustar(0.1)">+10cm</button>
            </div>
        </div>

        <div class="control-group">
            <span class="section-label">Ambiente</span>
            <label>Temperatura: <span id="temp-val" style="color: var(--accent);">25</span>°C</label>
            <input type="range" id="temp" min="0" max="50" value="25" oninput="calcularManual()">
        </div>
    </div>

    <script>
        let audioCtx;
        function calcularManual() {
            const dist = parseFloat(document.getElementById('dist').value) || 0;
            const temp = parseFloat(document.getElementById('temp').value);
            document.getElementById('temp-val').innerText = temp;
            let v = 331.4 + (0.6 * temp);
            let delay = (dist / v) * 1000;
            document.getElementById('res-ms').innerText = delay.toFixed(2);
        }
        function ajustar(val) {
            const input = document.getElementById('dist');
            input.value = (parseFloat(input.value) + val).toFixed(2);
            calcularManual();
        }
        function toggleAutoMeasure() {
            alert("Iniciando medição... Aproxime do falante.");
            // Lógica de áudio aqui (como construído anteriormente)
        }
        calcularManual();
        
    </script>
</body>
</html>
