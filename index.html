<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AUDIOBASE PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #0a0e14;
            --card: #161b22;
            --inner-bg: #0d1117;
            --text: #ffffff;
            --dim: #8b949e;
            --border: #30363d;
            --accent-orange: #ff9800; /* Delay */
            --accent-cyan: #00d2ff;   /* Projeto */
            --accent-purple: #a370f7; /* Fase */
            --accent-green: #44ff44;  /* Gerador */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header { text-align: center; margin: 50px 0 40px; }
        header h1 { font-size: 1.8rem; letter-spacing: 2px; color: var(--text); font-weight: bold; }
        header p { color: var(--dim); font-size: 0.85rem; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }

        .container { width: 90%; max-width: 450px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 50px; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: transform 0.2s, border-color 0.2s, background 0.2s;
        }

        .card:active { transform: scale(0.96); background: var(--inner-bg); }

        .icon-box {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            background: var(--inner-bg);
            box-shadow: 0 0 0 1px var(--border);
        }

        .info h2 { font-size: 1.1rem; color: var(--text); margin-bottom: 5px; }
        .info p { font-size: 0.8rem; color: var(--dim); line-height: 1.3; }

        /* Cores Específicas dos Cards */
        .card-delay .icon-box { color: var(--accent-orange); }
        .card-projeto .icon-box { color: var(--accent-cyan); }
        .card-fase .icon-box { color: var(--accent-purple); }
        .card-gerador .icon-box { color: var(--accent-green); }
        
        .card:hover { border-color: var(--dim); }
    </style>
</head>
<body>

    <header>
        <h1>AUDIOBASE PRO</h1>
        <p>Engineering & Sound Design</p>
    </header>

    <div class="container">
        <a href="delay.html" class="card card-delay">
            <div class="icon-box"><i class="fas fa-stopwatch"></i></div>
            <div class="info">
                <h2>Delay / TA</h2>
                <p>Alinhamento de tempo • Cálculo de atraso entre vias</p>
            </div>
        </a>

        <a href="projeto.html" class="card card-projeto">
            <div class="icon-box"><i class="fas fa-chart-bar"></i></div>
            <div class="info">
                <h2>Projeto do Sistema</h2>
                <p>Impedância • Potência • Limiter • Amp</p>
            </div>
        </a>

        <a href="fase.html" class="card card-fase">
            <div class="icon-box"><i class="fas fa-volume-up"></i></div>
            <div class="info">
                <h2>Scanner de Fase</h2>
                <p>Detecção de polaridade • Pulso de teste</p>
            </div>
        </a>

        <a href="gerador.html" class="card card-gerador">
            <div class="icon-box"><i class="fas fa-wave-square"></i></div>
            <div class="info">
                <h2>Gerador de Sinais</h2>
                <p>Ruído Rosa • Branco • Senoides</p>
            </div>
        </a>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("AudioBase Pro: Service Worker Ativo"));
        }
    </script>
</body>
</html>
