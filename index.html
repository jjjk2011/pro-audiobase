<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AUDIOBASE PRO</title>
    <!-- Fontes e Ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            /* Cores de Fundo - Ultra Dark */
            --bg-base: #09090b;
            --bg-gradient: radial-gradient(circle at top, #13131a 0%, #09090b 100%);

            /* Superfícies de Vidro (Glassmorphism) */
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(255, 255, 255, 0.06);

            /* Textos */
            --text-main: #ffffff;
            --text-muted: #a1a1aa;

            /* Acentos Neon */
            --accent-delay: #ff5500;
            --accent-projeto: #00d2ff;
            --accent-fase: #b042ff;
            --accent-gerador: #39ff14;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-base);
            background-image: var(--bg-gradient);
            color: var(--text-main);
            font-family: 'Outfit', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Efeito de Luz de Fundo (Glow background orb) */
        .bg-glow {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: -1;
            filter: blur(40px);
        }

        header {
            text-align: center;
            margin: 60px 0 40px;
            position: relative;
            z-index: 1;
        }

        header h1 {
            font-size: 2.2rem;
            letter-spacing: 3px;
            font-weight: 700;
            background: linear-gradient(90deg, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 300;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            padding-bottom: 60px;
            z-index: 1;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px 24px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Linha superior brilhante nos cards */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover {
            background: var(--glass-hover);
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:active {
            transform: translateY(0) scale(0.98);
        }

        .icon-box {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            position: relative;
            transition: all 0.3s;
        }

        .info {
            flex: 1;
        }

        .info h2 {
            font-size: 1.15rem;
            color: var(--text-main);
            margin-bottom: 4px;
            font-weight: 600;
        }

        .info p {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.4;
            font-weight: 300;
        }

        .arrow {
            color: var(--glass-border);
            font-size: 1.2rem;
            transition: color 0.3s, transform 0.3s;
        }

        .card:hover .arrow {
            transform: translateX(5px);
            color: var(--text-main);
        }

        /* Estilos Específicos e Efeitos Glow */
        .card-delay:hover .icon-box {
            border-color: var(--accent-delay);
            color: var(--accent-delay);
            box-shadow: 0 0 20px rgba(255, 85, 0, 0.2);
        }

        .card-delay .icon-box {
            color: var(--accent-delay);
        }

        .card-projeto:hover .icon-box {
            border-color: var(--accent-projeto);
            color: var(--accent-projeto);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }

        .card-projeto .icon-box {
            color: var(--accent-projeto);
        }

        .card-fase:hover .icon-box {
            border-color: var(--accent-fase);
            color: var(--accent-fase);
            box-shadow: 0 0 20px rgba(176, 66, 255, 0.2);
        }

        .card-fase .icon-box {
            color: var(--accent-fase);
        }

        .card-gerador:hover .icon-box {
            border-color: var(--accent-gerador);
            color: var(--accent-gerador);
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.2);
        }

        .card-gerador .icon-box {
            color: var(--accent-gerador);
        }
    </style>
</head>

<body>

    <div class="bg-glow"></div>

    <header>
        <h1>AUDIOBASE PRO</h1>
        <p>Engineering & Sound Design</p>
    </header>

    <div class="container">
        <a href="delay.html" class="card card-delay">
            <div class="icon-box"><i class="fas fa-stopwatch"></i></div>
            <div class="info">
                <h2>Delay / TA</h2>
                <p>Alinhamento de tempo • Atraso</p>
            </div>
            <i class="fas fa-chevron-right arrow"></i>
        </a>

        <a href="projeto.html" class="card card-projeto">
            <div class="icon-box"><i class="fas fa-chart-bar"></i></div>
            <div class="info">
                <h2>Projeto do Sistema</h2>
                <p>Impedância • Potência • Amp</p>
            </div>
            <i class="fas fa-chevron-right arrow"></i>
        </a>

        <a href="fase.html" class="card card-fase">
            <div class="icon-box"><i class="fas fa-volume-up"></i></div>
            <div class="info">
                <h2>Scanner de Fase</h2>
                <p>Detecção de polaridade</p>
            </div>
            <i class="fas fa-chevron-right arrow"></i>
        </a>

        <a href="gerador.html" class="card card-gerador">
            <div class="icon-box"><i class="fas fa-wave-square"></i></div>
            <div class="info">
                <h2>Gerador de Sinais</h2>
                <p>Ruído Rosa • Senoides</p>
            </div>
            <i class="fas fa-chevron-right arrow"></i>
        </a>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log("AudioBase Pro: Service Worker Ativo"));
        }
    </script>
</body>

</html>
