<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUDIOBASE PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0a0e14;
            --card-bg: #161b22;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --accent-orange: #ff9800;
            --accent-cyan: #00d2ff;
            --accent-purple: #a370f7;
            --card-border: #30363d;
            --accent-green: #44ff44;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-top: 50px;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        header h1 span { color: var(--accent-cyan); font-weight: 300; }

        header p {
            color: var(--text-dim);
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .container {
            width: 90%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 25px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            text-decoration: none;
            color: inherit;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #58a6ff66;
            background: #1c2128;
        }

        .icon-box {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            background: #0d1117;
            border: 1px solid var(--card-border);
        }

        /* Cores específicas dos Ícones */
        .card-delay .icon-box { border-color: var(--accent-orange); color: var(--accent-orange); box-shadow: 0 0 15px #ff980022; }
        .card-projeto .icon-box { border-color: var(--accent-cyan); color: var(--accent-cyan); box-shadow: 0 0 15px #00d2ff22; }
        .card-fase .icon-box { border-color: var(--accent-purple); color: var(--accent-purple); box-shadow: 0 0 15px #a370f722; }
        .card-gerador .icon-box { border-color: var(--accent-green); color: var(--accent-green); box-shadow: 0 0 15px #44ff4422; }

        .info h2 {
            margin: 0;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-delay h2 { color: var(--accent-orange); }
        .card-projeto h2 { color: var(--accent-cyan); }
        .card-fase h2 { color: var(--accent-purple); }
        .card-gerador h2 { color: var(--accent-green); }

        .info p {
            margin: 5px 0 0 0;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        footer {
            margin-top: auto;
            padding: 30px;
            color: var(--text-dim);
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <h1>AUDIOBASE <span>PRO</span></h1>
        <p>V 1.0</p>
    </header>

    <div class="container">
        <!-- Botão Delay -->
        <a href="delay.html" class="card card-delay">
            <div class="icon-box"><i class="fas fa-stopwatch"></i></div>
            <div class="info">
                <h2>Delay / TA</h2>
                <p>Alinhamento de tempo • Cálculo de atraso entre vias</p>
            </div>
        </a>

        <!-- Botão Projeto -->
        <a href="projeto.html" class="card card-projeto">
            <div class="icon-box"><i class="fas fa-chart-bar"></i></div>
            <div class="info">
                <h2>Projeto do Sistema</h2>
                <p>Impedância • Potência • Limiter • Amp</p>
            </div>
        </a>

        <!-- Botão Fase -->
        <a href="fase.html" class="card card-fase">
            <div class="icon-box"><i class="fas fa-volume-up"></i></div>
            <div class="info">
                <h2>Scanner de Fase</h2>
                <p>Detecção de polaridade • Pulso de teste</p>
            </div>
        </a>

        <a href="gerador.html" class="card card-gerador">
            <div class="icon-box"><i class="fas fa-wave-square"></i></div>
            <div class="info">
            <h2 style="color:#44ff44">Gerador de Sinais</h2>
            <p>Ruído Rosa • Branco • Senoides</p>
            </div>
        </a>

    </div>
    
    <script>if ('serviceWorker' in navigator) {navigator.serviceWorker.register('sw.js');} </script>

</body>
</html>
